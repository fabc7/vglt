name: Grabar Audio de Twitch

on:
  workflow_dispatch:
    inputs:
      twitch_channel:
        description: 'Nombre del canal de Twitch a grabar'
        required: true
        type: string

jobs:
  record_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install streamlink telethon

      - name: Obtener ID del Stream y configurar nombre
        run: |
          STREAM_ID=$(streamlink --json twitch.tv/${{ inputs.twitch_channel }} | jq -r '.metadata.id')
          if [ "$STREAM_ID" == "null" ] || [ -z "$STREAM_ID" ]; then STREAM_ID="unknown_id"; fi
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILENAME="audio_${{ inputs.twitch_channel }}_${STREAM_ID}_${TIMESTAMP}.m4a"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Grabar audio con Streamlink
        run: |
          echo "Iniciando grabación del canal: ${{ inputs.twitch_channel }}"
          MINUTOS_MAXIMOS=300
          timeout ${MINUTOS_MAXIMOS}m streamlink twitch.tv/${{ inputs.twitch_channel }} audio_only -o "${{ env.FILENAME }}" --twitch-disable-hosting --stream-segment-threads 1 || [ $? -eq 124 ]
          echo "Grabación finalizada (o tiempo límite alcanzado)."

      - name: Enviar audio a Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CANAL_ID: ${{ secrets.CANAL_ID }}
        if: always() 
        run: |
          STREAM_TITLE="Directo sin título"
          STREAM_ID="N/A"
          
          # Intentar obtener metadata, pero no detener si falla
          if METADATA=$(streamlink --json twitch.tv/${{ inputs.twitch_channel }} 2>/dev/null); then
            EXTRACTED_TITLE=$(echo "$METADATA" | jq -r '.metadata.title // empty' 2>/dev/null)
            EXTRACTED_ID=$(echo "$METADATA" | jq -r '.metadata.id // empty' 2>/dev/null)
            
            if [ -n "$EXTRACTED_TITLE" ] && [ "$EXTRACTED_TITLE" != "null" ]; then
              STREAM_TITLE="$EXTRACTED_TITLE"
            fi
            if [ -n "$EXTRACTED_ID" ] && [ "$EXTRACTED_ID" != "null" ]; then
              STREAM_ID="$EXTRACTED_ID"
            fi
          fi
          
          echo "Enviando audio a Telegram: TÍTULO='$STREAM_TITLE' ID='$STREAM_ID'"
          python send_telegram.py "${{ env.FILENAME }}" "$STREAM_TITLE" "$STREAM_ID"
