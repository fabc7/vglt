name: Grabar Audio de Twitch

on:
  workflow_dispatch:
    inputs:
      twitch_channel:
        description: 'Nombre del canal de Twitch a grabar'
        required: true
        type: string

jobs:
  record_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install streamlink telethon

      - name: Obtener ID del Stream y configurar nombre
        run: |
          STREAM_ID=$(streamlink --json twitch.tv/${{ inputs.twitch_channel }} | jq -r '.metadata.id')
          STREAM_TITLE=$(streamlink --json twitch.tv/${{ inputs.twitch_channel }} | jq -r '.metadata.title')
          if [ "$STREAM_ID" == "null" ] || [ -z "$STREAM_ID" ]; then STREAM_ID="unknown_id"; fi
          if [ "$STREAM_TITLE" == "null" ] || [ -z "$STREAM_TITLE" ]; then STREAM_TITLE="Directo sin título"; fi
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILENAME="audio_${{ inputs.twitch_channel }}_${STREAM_ID}_${TIMESTAMP}.m4a"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "STREAM_ID=$STREAM_ID" >> $GITHUB_ENV
          echo "STREAM_TITLE=$STREAM_TITLE" >> $GITHUB_ENV
          echo "Metadata obtenida - TÍTULO: $STREAM_TITLE | ID: $STREAM_ID | ARCHIVO: $FILENAME"

      - name: Grabar audio con Streamlink
        id: record_status
        run: |
          echo "Iniciando grabación del canal: ${{ inputs.twitch_channel }}"
          MINUTOS_MAXIMOS=1
          
          timeout ${MINUTOS_MAXIMOS}m streamlink twitch.tv/${{ inputs.twitch_channel }} audio_only -o "${{ env.FILENAME }}" --twitch-disable-hosting --stream-segment-threads 1
          EXITCODE=$?
          
          if [ $EXITCODE -eq 124 ]; then
            echo "timeout_reached=true" >> $GITHUB_OUTPUT
            echo "✓ Tiempo límite alcanzado (330 min). El stream sigue en vivo."
          elif [ $EXITCODE -eq 0 ]; then
            echo "timeout_reached=false" >> $GITHUB_OUTPUT
            echo "✓ Grabación finalizó naturalmente. El stream terminó."
          else
            echo "timeout_reached=false" >> $GITHUB_OUTPUT
            echo "⚠ Error durante la grabación (código: $EXITCODE)"
            exit $EXITCODE
          fi

      - name: Verificar archivo de grabación
        run: |
          if [ ! -f "${{ env.FILENAME }}" ]; then
            echo "❌ Error: El archivo no se creó"
            exit 1
          fi
          
          FILE_SIZE=$(du -h "${{ env.FILENAME }}" | cut -f1)
          echo "✓ Archivo creado: ${{ env.FILENAME }} (${FILE_SIZE})"

      - name: Comprimir audio
        run: |
          echo "Comprimiendo audio..."
          OUTPUT_FILE="compressed_${{ env.FILENAME }}"
          
          ffmpeg -i "${{ env.FILENAME }}" \
            -c:a aac \
            -b:a 64k \
            -vn \
            -ac 1 \
            -threads 0 \
            "$OUTPUT_FILE"
          
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "❌ Error: Compresión fallida"
            exit 1
          fi
          
          echo "COMPRESSED_FILE=$OUTPUT_FILE" >> $GITHUB_ENV

      - name: Enviar audio a Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CANAL_ID: ${{ secrets.CANAL_ID }}
        if: always() 
        run: |
          echo "Enviando audio a Telegram..."
          echo "TÍTULO: ${{ env.STREAM_TITLE }}"
          echo "ID: ${{ env.STREAM_ID }}"
          python send_telegram.py "${{ env.COMPRESSED_FILE }}" "${{ env.STREAM_TITLE }}" "${{ env.STREAM_ID }}"

      - name: Limpiar archivos temporales
        if: always()
        run: |
          rm -f "${{ env.FILENAME }}" "${{ env.COMPRESSED_FILE }}"
          echo "✓ Archivos temporales eliminados"

      - name: Disparar nueva grabación si el stream sigue en vivo
        if: steps.record_status.outputs.timeout_reached == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('El timeout se alcanzó. Disparando nueva grabación...');
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'record_twitch.yml',
              ref: context.ref,
              inputs: {
                twitch_channel: '${{ inputs.twitch_channel }}'
              }
            });
            console.log('✓ Nueva ejecución disparada automáticamente');
