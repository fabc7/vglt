name: Grabar Audio de Twitch

on:
  workflow_dispatch:
    inputs:
      twitch_channel:
        description: 'Nombre del canal de Twitch a grabar (ej: ibai)'
        required: true
        type: string

jobs:
  record_and_send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install streamlink telethon

      - name: Grabar audio con Streamlink
        # Usa 'audio_only' para no consumir recursos procesando video.
        # El comando se quedará ejecutándose hasta que el streamer apague el directo.
        run: |
          echo "Iniciando grabación del canal: ${{ inputs.twitch_channel }}"
          
          # Generamos un nombre de archivo dinámico con la fecha actual
          FILENAME="audio_${{ inputs.twitch_channel }}_$(date +'%Y%m%d_%H%M%S').m4a"
          
          # Guardamos el nombre del archivo en las variables de entorno para el siguiente paso
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          
          # Ejecutamos Streamlink (desactivando hostings para que no grabe otro canal al terminar)
          streamlink twitch.tv/${{ inputs.twitch_channel }} audio_only -o "$FILENAME" --twitch-disable-hosting
          
          echo "Grabación finalizada."

      - name: Enviar audio a Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CANAL_ID: ${{ secrets.CANAL_ID }}
        # Se ejecuta siempre, incluso si Streamlink da algún error al final, 
        # para intentar enviar lo que se haya grabado.
        if: always() 
        run: |
          python send_telegram.py "${{ env.FILENAME }}"
