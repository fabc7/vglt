name: Grabar Audio de Twitch

on:
  workflow_dispatch:
    inputs:
      twitch_channel:
        description: 'Nombre del canal de Twitch a grabar'
        required: true
        type: string

jobs:
  record_and_send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install streamlink telethon

      - name: Obtener ID del Stream y configurar nombre
        run: |
          STREAM_ID=$(streamlink --json twitch.tv/${{ inputs.twitch_channel }} | jq -r '.metadata.id')

          if [ "$STREAM_ID" == "null" ] || [ -z "$STREAM_ID" ]; then
            echo "El canal no está en directo o no se pudo obtener el ID."
            # Opcional: Podrías forzar la salida aquí si no hay ID
            STREAM_ID="unknown_id"
          fi

          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILENAME="audio_${{ inputs.twitch_channel }}_${STREAM_ID}_${TIMESTAMP}.m4a"
          
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "ID del stream detectado: $STREAM_ID"

      - name: Grabar audio con Streamlink
        run: |
          echo "Iniciando grabación del canal: ${{ inputs.twitch_channel }}"
          
          MINUTOS_MAXIMOS=1
          FILENAME="audio_${{ inputs.twitch_channel }}_$(date +'%Y%m%d_%H%M%S').m4a"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          
          timeout ${MINUTOS_MAXIMOS}m streamlink twitch.tv/${{ inputs.twitch_channel }} audio_only -o "$FILENAME" --twitch-disable-hosting --stream-segment-threads 1 || [ $? -eq 124 ]
          
          echo "Grabación finalizada (o tiempo límite alcanzado)."

      - name: Enviar audio a Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CANAL_ID: ${{ secrets.CANAL_ID }}
        if: always() 
        run: |
          METADATA=$(streamlink --json twitch.tv/${{ inputs.twitch_channel }})
          STREAM_TITLE=$(echo $METADATA | jq -r '.metadata.title')
          STREAM_ID=$(echo $METADATA | jq -r '.metadata.id')
          
          if [ -z "$STREAM_TITLE" ] || [ "$STREAM_TITLE" == "null" ]; then STREAM_TITLE="Directo sin título"; fi
          if [ -z "$STREAM_ID" ] || [ "$STREAM_ID" == "null" ]; then STREAM_ID="N/A"; fi
          
          python send_telegram.py "${{ env.FILENAME }}" "$STREAM_TITLE" "$STREAM_ID"
