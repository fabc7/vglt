name: Grabar Audio de Twitch

on:
  workflow_dispatch:
    inputs:
      twitch_channel:
        description: 'Nombre del canal de Twitch a grabar (ej: ibai)'
        required: true
        type: string

jobs:
  record_and_send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install streamlink telethon

      - name: Grabar audio con Streamlink
        run: |
          echo "Iniciando grabación del canal: ${{ inputs.twitch_channel }}"
          
          # Configuración
          MINUTOS_MAXIMOS=2  # <--- CAMBIA AQUÍ TU LÍMITE DE MINUTOS
          FILENAME="audio_${{ inputs.twitch_channel }}_$(date +'%Y%m%d_%H%M%S').m4a"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          
          # Calculamos los segundos para el comando timeout
          SEGUNDOS=$((MINUTOS_MAXIMOS * 60))
          
          # Streamlink con parámetros de máxima ligereza:
          # --stream-segment-threads 1: Reduce consumo de CPU/red al mínimo.
          # audio_only: Selecciona la mejor pista de audio disponible.
          # timeout: Mata el proceso al llegar a los minutos indicados.
          
          timeout ${SEGUNDOS}s streamlink twitch.tv/${{ inputs.twitch_channel }} audio_only -o "$FILENAME" --twitch-disable-hosting --stream-segment-threads 1
          
          echo "Grabación finalizada o tiempo límite alcanzado."

      - name: Enviar audio a Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CANAL_ID: ${{ secrets.CANAL_ID }}
        # Se ejecuta siempre, incluso si Streamlink da algún error al final, 
        # para intentar enviar lo que se haya grabado.
        if: always() 
        run: |
          python send_telegram.py "${{ env.FILENAME }}"
